{% extends "layouts/base.html" %}

{% block title %}Mở cửa ngăn thành công{% endblock %}

{% block content %}
<div class="py-4">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 text-center">
        <div class="card border-0 shadow py-5">
          <div class="card-body">
            <div class="mb-3">
              <i class="fas fa-lock-open fa-4x text-success"></i>
            </div>
            <h4>Đã mở cửa!</h4>
            <p class="text-muted">
              {{ booking.compartment.locker.name }} — Ngăn {{ booking.compartment.number }}
            </p>
            <p class="text-muted small">{{ booking.compartment.locker.location }}</p>
            <a href="{% url 'my_bookings' %}" class="btn btn-primary mt-3">
              <i class="fas fa-list me-1"></i> Về danh sách ngăn
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
